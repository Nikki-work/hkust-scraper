name: Daily HKUST Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives GitHub permission to save the CSV file
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      PYTHONUNBUFFERED: '1'
      
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Packages
      run: pip install requests beautifulsoup4

    - name: Run Script
      run: python scraper.py

    - name: Save CSV back to GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Updated news.csv with latest daily scrape"
        file_pattern: news.csv
